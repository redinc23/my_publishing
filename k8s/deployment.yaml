apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorsphere-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: authorsphere
  template:
    metadata:
      labels:
        app: authorsphere
    spec:
      containers:
      - name: app
        image: authorsphere:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: authorsphere-secrets
              key: database-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: authorsphere-secrets
              key: openai-api-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: authorsphere-service
spec:
  selector:
    app: authorsphere
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
