substitutions:
  _REGION: us-central1
  _SERVICE_NAME: mangu-publishers
  _AR_REPO: web-images
  _IMAGE_NAME: mangu-publishers
  _PLATFORM: managed
  _PORT: '3000'
  _MEMORY: 512Mi
  # No hardcoded defaults — all values must be supplied via trigger substitutions
  # or ./scripts/gcloud-build-submit.sh (HUMAN_TASKS.md H0.1 automated 2026-07).
  # Empty values here enable CI build-only mode on the GitHub trigger (compile +
  # lint gates with mock NEXT_PUBLIC_*; deploy steps skipped).
  _NEXT_PUBLIC_SUPABASE_URL: ''
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
  _NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: 'pk_test_ci_build_only'
  _NEXT_PUBLIC_SITE_URL: 'https://www.mangu-publishers.com'
  _NEXT_PUBLIC_SENTRY_DSN: ''
  _SUPABASE_SERVICE_ROLE_KEY: ''

steps:
  - id: npm-ci
    name: node:22
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm ci

  - id: lint-and-typecheck
    name: node:22
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm run lint
        npm run type-check

  - id: next-build
    name: node:22
    env:
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_SENTRY_DSN=${_NEXT_PUBLIC_SENTRY_DSN}
      - SENTRY_RELEASE=$SHORT_SHA
      - SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY}
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        # GitHub trigger runs without _NEXT_PUBLIC_SUPABASE_ANON_KEY — compile with
        # CI mocks and skip deploy (see docker-build+). Production submits must
        # pass real substitutions via ./scripts/gcloud-build-submit.sh.
        CI_BUILD_ONLY=false
        if [ -z "$${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
          CI_BUILD_ONLY=true
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.test-anon-key-for-ci"
          export SUPABASE_SERVICE_ROLE_KEY="$${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsYWNlaG9sZGVyIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTY0NTI2NDAwMCwiZXhwIjoxOTYwODQwMDAwfQ.ci-build-only}"
          echo "CI build-only mode: no _NEXT_PUBLIC_SUPABASE_ANON_KEY substitution."
          echo "Deploy skipped — use ./scripts/gcloud-build-submit.sh for production."
        fi
        echo "$${CI_BUILD_ONLY}" > /workspace/.ci-build-only

        require_pub() {
          local name="$1"
          local val="$2"
          if [ -z "$${val}" ] || [[ "$${val}" == *placeholder* ]] || [[ "$${val}" == *example.com* ]]; then
            echo "ERROR: $${name} is empty or placeholder (got: '$${val}')."
            echo "Submit with: ./scripts/gcloud-build-submit.sh (loads .env.local substitutions)."
            exit 1
          fi
        }
        require_pub NEXT_PUBLIC_SUPABASE_URL "$${NEXT_PUBLIC_SUPABASE_URL}"
        require_pub NEXT_PUBLIC_SUPABASE_ANON_KEY "$${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
        require_pub NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY "$${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
        require_pub NEXT_PUBLIC_SITE_URL "$${NEXT_PUBLIC_SITE_URL}"
        npm run build

  # PERF-PHASE2-8 — CI perf budget check: fail if main JS bundle exceeds 250kB gzipped
  - id: perf-budget
    name: node:22
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        echo "Checking bundle sizes..."
        MAX_SIZE_KB=250
        for f in .next/static/chunks/*.js; do
          SIZE=$(gzip -c "$$f" | wc -c)
          SIZE_KB=$((SIZE / 1024))
          if [ "$$SIZE_KB" -gt "$$MAX_SIZE_KB" ]; then
            echo "FAIL: $$f is $${SIZE_KB}kB gzipped (limit: $${MAX_SIZE_KB}kB)"
            exit 1
          fi
        done
        echo "All chunks under $${MAX_SIZE_KB}kB gzipped — PASS"

  - id: secret-audit
    name: node:22
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        # Runtime-only secrets must never be embedded in artifacts.
        # Scan both browser and server bundles plus public assets.
        PATTERN="sk_test_|sk_live_|whsec_|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|re_[A-Za-z0-9_]+|SUPABASE_SERVICE_ROLE_KEY|STRIPE_SECRET_KEY|RESEND_API_KEY|UPSTASH_REDIS_REST_TOKEN"
        for target in .next/static .next/server public; do
          if [ -d "$$target" ]; then
            ! grep -R -nE "$$PATTERN" "$$target"
          fi
        done

  - id: docker-build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ "$(cat /workspace/.ci-build-only 2>/dev/null || echo false)" = "true" ]; then
          echo "Skipping docker-build: CI build-only mode (no production anon key)."
          exit 0
        fi
        docker build \
          -t ${_REGION}-docker.pkg.dev/$$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$$SHORT_SHA \
          -t ${_REGION}-docker.pkg.dev/$$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:main \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL} \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY} \
          --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY} \
          --build-arg NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL} \
          --build-arg NEXT_PUBLIC_SENTRY_DSN=${_NEXT_PUBLIC_SENTRY_DSN} \
          --build-arg SENTRY_RELEASE=$$SHORT_SHA \
          --build-arg SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY} \
          .

  - id: docker-push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ "$(cat /workspace/.ci-build-only 2>/dev/null || echo false)" = "true" ]; then
          echo "Skipping docker-push: CI build-only mode."
          exit 0
        fi
        docker push ${_REGION}-docker.pkg.dev/$$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$$SHORT_SHA

  - id: docker-push-main
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ "$(cat /workspace/.ci-build-only 2>/dev/null || echo false)" = "true" ]; then
          echo "Skipping docker-push-main: CI build-only mode."
          exit 0
        fi
        docker push ${_REGION}-docker.pkg.dev/$$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:main

  # Scan the pushed image for OS-level and language CVEs using Trivy.
  # The build fails on any CRITICAL severity vulnerabilities, blocking
  # insecure images from reaching Cloud Run (supply-chain security gate P0-1).
  - id: vuln-scan
    name: aquasec/trivy:latest
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        if [ "$(cat /workspace/.ci-build-only 2>/dev/null || echo false)" = "true" ]; then
          echo "Skipping vuln-scan: CI build-only mode."
          exit 0
        fi
        exec trivy image \
          --scanners vuln \
          --exit-code=1 \
          --severity=CRITICAL \
          --no-progress \
          --ignore-unfixed \
          ${_REGION}-docker.pkg.dev/$$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$$SHORT_SHA

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ "$(cat /workspace/.ci-build-only 2>/dev/null || echo false)" = "true" ]; then
          echo "Skipping deploy-cloud-run: CI build-only mode."
          exit 0
        fi
        REQUIRED_SECRETS="SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest"
        OPTIONAL_SECRETS=""

        if gcloud secrets describe resend-api-key --project="$PROJECT_ID" >/dev/null 2>&1; then
          OPTIONAL_SECRETS="$${OPTIONAL_SECRETS},RESEND_API_KEY=resend-api-key:latest"
        fi

        if gcloud secrets describe openai-api-key --project="$PROJECT_ID" >/dev/null 2>&1; then
          OPTIONAL_SECRETS="$${OPTIONAL_SECRETS},OPENAI_API_KEY=openai-api-key:latest"
        fi

        if gcloud secrets describe upstash-redis-rest-url --project="$PROJECT_ID" >/dev/null 2>&1; then
          OPTIONAL_SECRETS="$${OPTIONAL_SECRETS},UPSTASH_REDIS_REST_URL=upstash-redis-rest-url:latest"
        fi

        if gcloud secrets describe upstash-redis-rest-token --project="$PROJECT_ID" >/dev/null 2>&1; then
          OPTIONAL_SECRETS="$${OPTIONAL_SECRETS},UPSTASH_REDIS_REST_TOKEN=upstash-redis-rest-token:latest"
        fi

        gcloud run deploy "${_SERVICE_NAME}" \
          --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$SHORT_SHA" \
          --platform="${_PLATFORM}" \
          --region="${_REGION}" \
          --port="${_PORT}" \
          --memory="${_MEMORY}" \
          --allow-unauthenticated \
          --no-default-url \
          --startup-probe=httpGet.path=/api/live,httpGet.port=3000,initialDelaySeconds=10,timeoutSeconds=5,periodSeconds=10,failureThreshold=12 \
          --liveness-probe=httpGet.path=/api/live,httpGet.port=3000,initialDelaySeconds=30,timeoutSeconds=5,periodSeconds=20,failureThreshold=3 \
          --set-env-vars="NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL},NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY},NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY},NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL},SENTRY_RELEASE=$SHORT_SHA" \
          --set-secrets="$${REQUIRED_SECRETS}$${OPTIONAL_SECRETS}"

  - id: verify-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ "$(cat /workspace/.ci-build-only 2>/dev/null || echo false)" = "true" ]; then
          echo "Skipping verify-deploy: CI build-only mode."
          exit 0
        fi
        gcloud run services describe "${_SERVICE_NAME}" \
          --region="${_REGION}" \
          --project="$PROJECT_ID" \
          --format='yaml(metadata.name,status.traffic,spec.template.spec.containers[0].image,spec.template.spec.containers[0].ports,spec.template.spec.containers[0].resources,spec.template.spec.containers[0].env,spec.template.metadata.annotations)'

# Images are pushed explicitly in docker-push / docker-push-main steps so CI
# build-only mode (GitHub trigger without anon key) can skip container phases
# without Cloud Build failing on a top-level images: block.

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 2400s
