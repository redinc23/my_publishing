substitutions:
  _REGION: us-central1
  _SERVICE_NAME: mangu-publishers
  _AR_REPO: web-images
  _IMAGE_NAME: mangu-publishers
  _PLATFORM: managed
  _PORT: "3000"
  _MEMORY: 512Mi
  _NEXT_PUBLIC_SUPABASE_URL: ""
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
  _NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
  _NEXT_PUBLIC_SITE_URL: ""

steps:
  - id: npm-ci
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm ci

  - id: lint-and-typecheck
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm run lint
        npm run type-check

  - id: next-build
    name: node:20
    env:
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL}
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm run build

  - id: secret-audit
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        # Runtime-only secrets must never be embedded in client bundle artifacts.
        # Scan only browser-delivered assets to avoid server-side false positives.
        ! grep -R -nE "sk_test_|sk_live_|whsec_" .next/static

  - id: docker-build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$SHORT_SHA
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - --build-arg
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - --build-arg
      - NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL}
      - .

  - id: docker-push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$SHORT_SHA

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud run deploy "${_SERVICE_NAME}" \
          --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$SHORT_SHA" \
          --platform="${_PLATFORM}" \
          --region="${_REGION}" \
          --port="${_PORT}" \
          --memory="${_MEMORY}" \
          --allow-unauthenticated \
          --no-default-url \
          --set-env-vars="NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL},NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY},NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY},NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL}" \
          --set-secrets="SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,RESEND_API_KEY=resend-api-key:latest"

  - id: verify-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud run services describe "${_SERVICE_NAME}" \
          --region="${_REGION}" \
          --project="$PROJECT_ID" \
          --format='yaml(metadata.name,status.traffic,spec.template.spec.containers[0].image,spec.template.spec.containers[0].ports,spec.template.spec.containers[0].resources,spec.template.spec.containers[0].env,spec.template.metadata.annotations)'

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 2400s
