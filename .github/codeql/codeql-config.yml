name: "CodeQL Configuration for mangu-platform"

# Specify the languages to analyze
# For a Next.js/TypeScript project, we analyze JavaScript/TypeScript
queries:
  # Use the default queries
  - uses: security-extended
  - uses: security-and-quality

# Specify paths to exclude from analysis
paths-ignore:
  # Build outputs
  - ".next"
  - "out"
  - "build"
  - "dist"

  # Dependencies
  - "node_modules"

  # Test files (optional - you may want to analyze these)
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "tests/e2e/**"
  - "__tests__/**"

  # Generated files
  - "*.generated.ts"
  - "*.generated.tsx"

  # Configuration files
  - "*.config.js"
  - "*.config.ts"
  - "next.config.js"
  - "tailwind.config.ts"
  - "postcss.config.js"
  - "jest.config.js"
  - "playwright.config.ts"

  # Documentation
  - "docs/**"
  - "*.md"

  # Static assets
  - "public/**"

# Specify paths to analyze (if you want to be explicit)
paths:
  - "app"
  - "components"
  - "lib"
  - "types"
  - "scripts"

# Query filters to customize which queries run
query-filters:
  # Exclude queries with high false positive rates
  - exclude:
      id: js/unused-local-variable
  - exclude:
      id: js/useless-expression

# Threat model configuration
# This helps CodeQL understand which data sources should be considered untrusted
threat-models:
  - remote    # Network inputs (API calls, fetch, etc.)
  - local     # Local file system access
  - environment  # Environment variables

# Additional configuration for JavaScript/TypeScript
# These settings help CodeQL better understand the codebase
languages:
  javascript:
    # Extraction settings
    extraction:
      # TypeScript configuration
      typescript:
        # The TypeScript version to use
        version: "5.x"
