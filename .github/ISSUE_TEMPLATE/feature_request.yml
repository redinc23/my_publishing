name: Feature request
description: Propose a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the problem you're trying to solve before jumping to a solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user problem or business need does this address?
      placeholder: As a [user], I want to [do X], so that [outcome].
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why you didn't choose them.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "UI / frontend"
        - "API route"
        - "Auth / Supabase"
        - "Payments / Stripe"
        - "Database / migrations"
        - "CI / deployment"
        - "Docs"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority (your view)
      options:
        - "Low — quality-of-life"
        - "Medium — improves a common flow"
        - "High — blocking or revenue-impacting"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done?
      placeholder: |
        - [ ] ...
        - [ ] ...

  - type: textarea
    id: context
    attributes:
      label: Additional context
