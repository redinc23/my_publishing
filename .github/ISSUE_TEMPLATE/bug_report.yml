name: Bug report
description: Report a defect in MANGU Publishers
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please fill out the sections below so we can reproduce and triage quickly.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues to make sure this isn't a duplicate
          required: true
        - label: I have read the README and relevant docs
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, and screenshots if available.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: false
      options:
        - "UI / frontend"
        - "API route"
        - "Auth / Supabase"
        - "Payments / Stripe"
        - "Database / migrations"
        - "CI / deployment"
        - "Other"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser, OS, Node version (if local), commit SHA / deployment URL.
      placeholder: "Chrome 124 on macOS 14, deployed @ commit abc123"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / console output
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
