# Closed-loop CI autofix: on CI / Format Check failure, dispatch a Cursor Cloud Agent
# to fix the PR branch. When checks pass, auto-merge.yml squash-merges.
#
# Setup (one-time, human):
#   1. Add repo secret CURSOR_API_KEY (Cursor Dashboard → API Keys)
#   2. Connect GitHub in Cursor Dashboard → Cloud Agents
#   3. Disable the legacy external automation (see HUMAN_TASKS.md H0.2)
#   4. Label PRs with `auto-merge` to opt in
#
# Guardrails: max 5 attempts/PR, dedupe by commit SHA, skip if agent already active,
# pause via `ci-fix-loop-paused` label.

name: CI Fix Loop

on:
  workflow_run:
    workflows:
      - CI
      - Format Check
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ci-fix-loop-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  dispatch-fix-agent:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch (prompt + script)
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'

      - name: Install Actions deps
        run: npm i --no-save @actions/core@1.11.1 @actions/github@6.0.0

      - name: Dispatch Cursor agent to fix CI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_HTML_URL: ${{ github.event.workflow_run.html_url }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          MAX_ATTEMPTS: '5'
        run: node .github/scripts/ci-fix-dispatch.mjs
