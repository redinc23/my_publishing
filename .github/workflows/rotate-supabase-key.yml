name: Rotate Supabase Anon Key

# ─────────────────────────────────────────────────────────────────────────────
# ONE-STOP rotation: push new key → GitHub Secrets → both Vercel projects
#
# Trigger: manual only (workflow_dispatch).
# Required GitHub Secrets (set once, never again):
#   VERCEL_TOKEN            – your Vercel personal access token
#   VERCEL_PROJECT_MY_PUBLISHING  – Vercel project ID for my_publishing
#   VERCEL_PROJECT_MANGUPROJECTZ  – Vercel project ID for manguprojectz
#   VERCEL_TEAM_ID          – Vercel team/org ID (leave empty for personal accounts)
#
# After this workflow completes Vercel will auto-redeploy both projects.
# You still need to disable the OLD key in Supabase dashboard (step shown in summary).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      new_anon_key:
        description: 'New NEXT_PUBLIC_SUPABASE_ANON_KEY (sb_publishable_… or eyJ…)'
        required: true
        type: string
      new_supabase_url:
        description: 'NEXT_PUBLIC_SUPABASE_URL (leave blank to keep existing)'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Dry run — validate inputs but make no changes'
        required: false
        type: boolean
        default: false

jobs:
  rotate:
    name: Push key to GitHub Secrets + Vercel
    runs-on: ubuntu-latest
    permissions:
      secrets: write  # needed to upsert GitHub Secrets via API

    steps:
      - name: Validate new key format
        run: |
          KEY="${{ github.event.inputs.new_anon_key }}"
          # Accept both legacy eyJ… JWT and new sb_publishable_… format
          if [[ "${KEY}" != eyJ* ]] && [[ "${KEY}" != sb_publishable_* ]]; then
            echo "::error::Key must start with 'eyJ' (JWT) or 'sb_publishable_'. Got: ${KEY:0:12}…"
            exit 1
          fi
          if [[ ${#KEY} -lt 40 ]]; then
            echo "::error::Key is suspiciously short (${#KEY} chars). Paste the full value."
            exit 1
          fi
          echo "Key format OK (${#KEY} chars, prefix: ${KEY:0:12}…)"

      - name: Update GitHub Secret — NEXT_PUBLIC_SUPABASE_ANON_KEY
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: gliech/create-github-secret-action@v1
        with:
          name: NEXT_PUBLIC_SUPABASE_ANON_KEY
          value: ${{ github.event.inputs.new_anon_key }}
          pa_token: ${{ secrets.GH_PAT_SECRETS }}

      - name: Update GitHub Secret — NEXT_PUBLIC_SUPABASE_URL (if provided)
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.new_supabase_url != '' }}
        uses: gliech/create-github-secret-action@v1
        with:
          name: NEXT_PUBLIC_SUPABASE_URL
          value: ${{ github.event.inputs.new_supabase_url }}
          pa_token: ${{ secrets.GH_PAT_SECRETS }}

      - name: Push to Vercel — my_publishing (Production + Preview)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_MY_PUBLISHING }}
          TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          NEW_KEY: ${{ github.event.inputs.new_anon_key }}
          NEW_URL: ${{ github.event.inputs.new_supabase_url }}
        run: |
          TEAM_PARAM=""
          [[ -n "${TEAM_ID}" ]] && TEAM_PARAM="?teamId=${TEAM_ID}"

          upsert_vercel_env() {
            local env_key="$1" env_value="$2"
            # Remove existing entries for all targets, then create fresh ones.
            for target in production preview; do
              # Fetch existing env var ID for this key+target
              EXISTING_ID=$(curl -sf \
                -H "Authorization: Bearer ${VERCEL_TOKEN}" \
                "https://api.vercel.com/v9/projects/${PROJECT_ID}/env${TEAM_PARAM}" \
                | jq -r --arg k "${env_key}" --arg t "${target}" \
                  '.envs[] | select(.key==$k and (.target | arrays | contains([$t]))) | .id' \
                | head -1)
              [[ -n "${EXISTING_ID}" ]] && \
                curl -sf -X DELETE \
                  -H "Authorization: Bearer ${VERCEL_TOKEN}" \
                  "https://api.vercel.com/v9/projects/${PROJECT_ID}/env/${EXISTING_ID}${TEAM_PARAM}" \
                  > /dev/null
            done
            # Create new entry covering both targets
            curl -sf -X POST \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.vercel.com/v10/projects/${PROJECT_ID}/env${TEAM_PARAM}" \
              -d "{\"key\":\"${env_key}\",\"value\":\"${env_value}\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" \
              | jq -r '.key + " → " + .target[]'
          }

          upsert_vercel_env "NEXT_PUBLIC_SUPABASE_ANON_KEY" "${NEW_KEY}"
          [[ -n "${NEW_URL}" ]] && upsert_vercel_env "NEXT_PUBLIC_SUPABASE_URL" "${NEW_URL}"

      - name: Push to Vercel — manguprojectz (Production + Preview)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_MANGUPROJECTZ }}
          TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          NEW_KEY: ${{ github.event.inputs.new_anon_key }}
          NEW_URL: ${{ github.event.inputs.new_supabase_url }}
        run: |
          TEAM_PARAM=""
          [[ -n "${TEAM_ID}" ]] && TEAM_PARAM="?teamId=${TEAM_ID}"

          upsert_vercel_env() {
            local env_key="$1" env_value="$2"
            for target in production preview; do
              EXISTING_ID=$(curl -sf \
                -H "Authorization: Bearer ${VERCEL_TOKEN}" \
                "https://api.vercel.com/v9/projects/${PROJECT_ID}/env${TEAM_PARAM}" \
                | jq -r --arg k "${env_key}" --arg t "${target}" \
                  '.envs[] | select(.key==$k and (.target | arrays | contains([$t]))) | .id' \
                | head -1)
              [[ -n "${EXISTING_ID}" ]] && \
                curl -sf -X DELETE \
                  -H "Authorization: Bearer ${VERCEL_TOKEN}" \
                  "https://api.vercel.com/v9/projects/${PROJECT_ID}/env/${EXISTING_ID}${TEAM_PARAM}" \
                  > /dev/null
            done
            curl -sf -X POST \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.vercel.com/v10/projects/${PROJECT_ID}/env${TEAM_PARAM}" \
              -d "{\"key\":\"${env_key}\",\"value\":\"${env_value}\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" \
              | jq -r '.key + " → " + .target[]'
          }

          upsert_vercel_env "NEXT_PUBLIC_SUPABASE_ANON_KEY" "${NEW_KEY}"
          [[ -n "${NEW_URL}" ]] && upsert_vercel_env "NEXT_PUBLIC_SUPABASE_URL" "${NEW_URL}"

      - name: Summary
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "### 🔍 Dry run complete — no changes made" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Key rotated in GitHub Secrets + both Vercel projects" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Both Vercel projects will redeploy automatically." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Required manual step — disable the OLD key:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Go to https://supabase.com/dashboard/project/tkzvikozrcynhwsqtkqp/settings/api" >> $GITHUB_STEP_SUMMARY
            echo "2. Under **API Keys** → find the legacy \`anon\` JWT → click **Disable**" >> $GITHUB_STEP_SUMMARY
            echo "3. Verify: \`curl -I https://tkzvikozrcynhwsqtkqp.supabase.co/rest/v1/ -H \"apikey: <OLD_KEY>\"\` should return 401" >> $GITHUB_STEP_SUMMARY
          fi
