name: Admin Setup Environments
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate only)'
        required: false
        default: false
        type: boolean
      skip_validation:
        description: 'Skip repository validation'
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.validate-repos.outputs.valid }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate repositories
        if: ${{ !inputs.skip_validation }}
        id: validate-repos
        run: |
          echo "Validating repository access..."
          valid_repos=0
          total_repos=0

          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^# ]] && continue

            repo=$(echo "$line" | cut -d'|' -f1)
            echo "Checking $repo..."

            if curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
               "https://api.github.com/repos/$repo" | grep -q '"id":'; then
              echo "✓ $repo is accessible"
              valid_repos=$((valid_repos + 1))
            else
              echo "✗ $repo is NOT accessible"
            fi

            total_repos=$((total_repos + 1))
          done < repos.txt

          if [[ $valid_repos -eq $total_repos ]]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

  setup:
    needs: validate
    if: ${{ needs.validate.outputs.valid == 'true' || inputs.skip_validation }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq libsodium-dev
          sudo npm install -g @actions/github
      - name: Run setup script
        run: |
          chmod +x setup-envs.sh
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "Running in DRY RUN mode"
            DRY_RUN=true ./setup-envs.sh repos.txt
          else
            ./setup-envs.sh repos.txt
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
