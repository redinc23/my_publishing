name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production-cloud-run
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ ((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || github.event.workflow_run.conclusion == 'success') && vars.GCP_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      HAS_GCP_SA_KEY: ${{ secrets.GCP_SA_KEY != '' }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Authenticate to Google Cloud
        if: ${{ env.HAS_GCP_SA_KEY == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        if: ${{ env.HAS_GCP_SA_KEY == 'true' }}
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: mangu-publishers
          region: us-central1
          source: .
          env_vars: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NODE_ENV=production
          # Privileged values are mounted from Secret Manager, never copied into
          # the workflow's plaintext environment-variable input.
          secrets: |
            SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest
            STRIPE_SECRET_KEY=stripe-secret-key:latest
            STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest
