name: E2E against Preview

on:
  deployment_status:

permissions:
  contents: read

jobs:
  e2e:
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      # BASE_URL makes playwright.config.ts target the deployed preview and
      # skip the local webServer entirely — no server env placeholders needed.
      # Real-backend suites (auth-flow, role-gating) self-skip unless the
      # runner has real NEXT_PUBLIC_SUPABASE_URL, so no USE_MOCKS here: the
      # preview is a real target and mocking it would fake the results.
      - run: npm run test:e2e
        env:
          BASE_URL: ${{ github.event.deployment_status.environment_url }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-preview-report
          path: playwright-report/
          retention-days: 7
