name: Cowork Operator Guard

# Flags Cursor automation PR storms and keeps a sticky issue for the human.
# Does not fix CI. Does not open code PRs.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: cowork-operator-guard
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Count storm PRs + ensure sticky issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const stormRe = /(ci-autofix-automation|repository-health-sweep)/i;
            const title = 'COWORK: disable Cursor storm automations';
            const body = [
              '## Cowork control',
              '',
              'Agents cannot disable Cursor Automations via API. Human must toggle:',
              '',
              '1. **Fix CI failures** → DISABLE',
              '   https://cursor.com/automations/094ce0ad-7ba5-11f1-ba66-0e7d0216e441',
              '2. **pr (Repository health sweep)** → DISABLE',
              '   https://cursor.com/automations/ab582f50-7ba7-11f1-ba66-0e7d0216e441',
              '',
              'Then create the safe automation using prompts in `.cursor/automations/`.',
              'See `docs/COWORK_OPERATOR.md`.',
              '',
              'This issue is maintained by `cowork-operator-guard.yml`.',
            ].join('\n');

            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', per_page: 100,
            });
            const storms = prs.filter((p) =>
              stormRe.test(p.head?.ref || '') || stormRe.test(p.title || '')
            );

            core.info(`Open PRs: ${prs.length}; storm-pattern: ${storms.length}`);
            for (const p of storms.slice(0, 20)) {
              core.info(`#${p.number} ${p.title} (${p.head.ref})`);
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'cowork-control', per_page: 20,
            });
            let issue = issues.find((i) => i.title === title);

            if (storms.length === 0) {
              if (issue) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: `Guard check: no open storm-pattern PRs at ${new Date().toISOString()}. Safe to keep automations disabled and run Phoenix next-slice only.`,
                });
              }
              core.notice('No storm PRs detected.');
              return;
            }

            const list = storms
              .slice(0, 30)
              .map((p) => `- #${p.number} \`${p.head.ref}\` — ${p.title}`)
              .join('\n');

            if (!issue) {
              const created = await github.rest.issues.create({
                owner, repo, title, body,
                labels: ['cowork-control', 'ops'],
              });
              issue = created.data;
            }

            await github.rest.issues.createComment({
              owner, repo, issue_number: issue.number,
              body: [
                `## Storm PR count: **${storms.length}**`,
                '',
                'Disable the two Cursor automations in `docs/COWORK_OPERATOR.md`, then close duplicate drafts.',
                '',
                list,
                '',
                `_guard run ${context.runId}_`,
              ].join('\n'),
            });

            core.setFailed(
              `${storms.length} storm-pattern PR(s) open — disable Cursor automations (see issue #${issue.number}).`
            );
