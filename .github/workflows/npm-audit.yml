name: npm Audit

on:
  schedule:
    - cron: '0 9 * * 1' # Mondays 9am UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'package*.json'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=critical
