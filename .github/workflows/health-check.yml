name: Production Health Check

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          TARGET_URL="https://mangu-publishers.com/api/health"
          
          echo "Checking health for $TARGET_URL..."
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" $TARGET_URL)
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Health check failed! HTTP Status: $HTTP_STATUS"
            exit 1
          else
            echo "✅ Health check passed. HTTP Status: $HTTP_STATUS"
          fi
