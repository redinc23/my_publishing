name: Production Health Check

# Canonical origin per ADR-001 (ACCEPTED Option B — Vercel):
#   Interim: https://www.mangu-publishers.com
# Probe semantics (CCR-013):
#   /api/live              — liveness; never a GO gate alone
#   /api/health            — startup
#   /api/health?ready=1    — readiness; ONLY GO-relevant probe (G7)
#
# Expect RED until Vercel Production has Stripe/Supabase/Upstash env
# (www was ready:false as of ADR acceptance — operator cutover checklist).
#
# Alerting: workflow failure notifies repository watchers / configured routing.
# Owner: Platform (P0-007 / ADR-001).

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

env:
  CANONICAL_ORIGIN: https://www.mangu-publishers.com

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Soft probes (live + startup) — never abort job
        run: |
          set -uo pipefail
          probe_soft() {
            local name="$1"
            local path="$2"
            local out="$3"
            local url="${CANONICAL_ORIGIN}${path}"
            echo "=== Soft: ${name} → ${url}"
            local code
            code=$(curl --retry 2 --retry-delay 1 --retry-all-errors \
              -sS -o "${out}" -w "%{http_code}" "${url}" 2>/tmp/curl-err.txt || true)
            if [[ -z "${code}" ]]; then code="000"; fi
            echo "HTTP ${code}"
            if [[ -s "${out}" ]]; then cat "${out}"; echo; fi
            if [[ -s /tmp/curl-err.txt ]]; then cat /tmp/curl-err.txt; fi
            if [[ "${code}" != "200" ]]; then
              echo "::warning::${name} soft probe not 200 (HTTP ${code}) — continuing to readiness"
            fi
          }
          probe_soft "Liveness" "/api/live" /tmp/live.json
          probe_soft "Startup" "/api/health" /tmp/startup.json

      - name: Readiness (/api/health?ready=1) — GO probe
        run: |
          set -euo pipefail
          URL="${CANONICAL_ORIGIN}/api/health?ready=1"
          echo "Readiness (GO): ${URL}"
          attempts=5
          delay=2
          for i in $(seq 1 "${attempts}"); do
            echo "--- attempt ${i}/${attempts}"
            set +e
            HTTP_STATUS=$(curl --retry 0 -sS -o /tmp/ready.json -w "%{http_code}" "${URL}" 2>/tmp/curl-err.txt)
            CURL_RC=$?
            set -e
            if [[ -z "${HTTP_STATUS}" ]]; then HTTP_STATUS="000"; fi
            echo "curl_rc=${CURL_RC} HTTP ${HTTP_STATUS}"
            if [[ -s /tmp/curl-err.txt ]]; then cat /tmp/curl-err.txt; fi
            if [[ -s /tmp/ready.json ]]; then cat /tmp/ready.json; echo; fi

            if [[ "${CURL_RC}" -eq 0 && "${HTTP_STATUS}" == "200" ]]; then
              if grep -qE '"ready"[[:space:]]*:[[:space:]]*true' /tmp/ready.json; then
                echo "✅ Readiness passed (ready:true) on attempt ${i}"
                exit 0
              fi
              echo "::warning::HTTP 200 but ready:true missing — retrying"
            else
              echo "::warning::Readiness not green yet (expect until Vercel Production env is complete)"
            fi
            sleep "${delay}"
          done

          echo "❌ Readiness failed after ${attempts} attempts (G7 / P0-007)"
          echo "Operator: set Stripe/Supabase/Upstash on Vercel Production and redeploy (docs/CANONICAL_PRODUCTION.md)."
          exit 1
