name: Dependabot Auto-Approve

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-approve:
    name: Auto-Approve Dependabot PRs
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine if auto-approve
        id: check
        run: |
          UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"
          DEPENDENCY_TYPE="${{ steps.metadata.outputs.dependency-type }}"

          echo "Update type: ${UPDATE_TYPE}"
          echo "Dependency type: ${DEPENDENCY_TYPE}"

          # Auto-approve minor and patch updates for production dependencies
          # Auto-approve all updates for development dependencies
          if [[ "${UPDATE_TYPE}" == "version-update:semver-minor" ]] || \
             [[ "${UPDATE_TYPE}" == "version-update:semver-patch" ]] || \
             [[ "${DEPENDENCY_TYPE}" == "development" ]]; then
            echo "should_approve=true" >> $GITHUB_OUTPUT
            echo "should_merge=true" >> $GITHUB_OUTPUT
          else
            echo "should_approve=false" >> $GITHUB_OUTPUT
            echo "should_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Approve PR
        if: ${{ steps.check.outputs.should_approve == 'true' }}
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: ${{ steps.check.outputs.should_merge == 'true' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major version updates
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-major' }}
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Major Version Update Detected

            This PR contains a **major version update** which may include breaking changes.

            ### Checklist before approving:
            - [ ] Review the changelog for breaking changes
            - [ ] Check if migration steps are required
            - [ ] Verify compatibility with existing code
            - [ ] Run full test suite locally

            **Dependency:** ${{ steps.metadata.outputs.dependency-names }}
            **Update:** ${{ steps.metadata.outputs.previous-version }} -> ${{ steps.metadata.outputs.new-version }}

            > This PR requires manual review and approval.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Add labels based on update type
        uses: actions/github-script@v7
        with:
          script: |
            const updateType = '${{ steps.metadata.outputs.update-type }}';
            const labels = ['dependencies'];

            if (updateType.includes('patch')) {
              labels.push('patch');
            } else if (updateType.includes('minor')) {
              labels.push('minor');
            } else if (updateType.includes('major')) {
              labels.push('major', 'breaking-change');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });

  security-check:
    name: Security Check for Dependabot PRs
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    needs: dependabot-auto-approve

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        id: audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Comment if vulnerabilities found
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Security Warning

            This dependency update introduces or maintains known vulnerabilities.

            Please review the npm audit output before merging.

            > Auto-merge has been blocked for this PR.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            // Remove auto-merge
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              auto_merge: null
            });
