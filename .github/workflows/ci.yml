name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

  detect_changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changes.outputs.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Paths Filter
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - '!docs/**'
              - '!**.md'
              - '!**.txt'

  deploy_preview:
    name: Deploy Preview (PR)
    needs: [test, detect_changes]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.detect_changes.outputs.has_changes == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight – Validate Secrets
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          missing=0

          if [[ -z "${VERCEL_TOKEN:-}" ]]; then
            echo "❌ Missing secret: VERCEL_TOKEN"
            missing=1
          fi

          if [[ -z "${VERCEL_ORG_ID:-}" ]]; then
            echo "❌ Missing secret: VERCEL_ORG_ID"
            missing=1
          fi

          if [[ -z "${VERCEL_PROJECT_ID:-}" ]]; then
            echo "❌ Missing secret: VERCEL_PROJECT_ID"
            missing=1
          fi

          if [[ "$missing" -ne 0 ]]; then
            echo ""
            echo "Fix: Repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Preview is default (do NOT pass --prod)

  deploy_production:
    name: Deploy Production (Main)
    needs: [test, detect_changes]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect_changes.outputs.has_changes == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight – Validate Secrets
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          missing=0

          if [[ -z "${VERCEL_TOKEN:-}" ]]; then
            echo "❌ Missing secret: VERCEL_TOKEN"
            missing=1
          fi

          if [[ -z "${VERCEL_ORG_ID:-}" ]]; then
            echo "❌ Missing secret: VERCEL_ORG_ID"
            missing=1
          fi

          if [[ -z "${VERCEL_PROJECT_ID:-}" ]]; then
            echo "❌ Missing secret: VERCEL_PROJECT_ID"
            missing=1
          fi

          if [[ "$missing" -ne 0 ]]; then
            echo ""
            echo "Fix: Repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: --prod
