name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    # Dummy build-time values so `next build` can prerender without real secrets.
    env:
      USE_MOCKS: 'true'
      NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
      NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy-anon-for-ci'
      NEXT_PUBLIC_SITE_URL: 'https://example.com'
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: 'pk_test_dummy'
      SUPABASE_SERVICE_ROLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy-service-role-for-ci'
      # Phoenix WS6.2 — Sentry release tagging in CI (WS6.2)
      SENTRY_RELEASE: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npm run validate:gap-ledger
      - run: npm run type-check
      - run: npm run lint
      - run: npm run build
