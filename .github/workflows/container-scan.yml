name: Container Image Scan

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'package*.json'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t my_publishing:${{ github.sha }} .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: my_publishing:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
