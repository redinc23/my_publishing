name: Container Image Scan

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'package*.json'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        env:
          USE_MOCKS: true
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=https://test.supabase.co \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.test-anon-key-for-ci \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_placeholder \
            --build-arg NEXT_PUBLIC_SITE_URL=http://localhost:3000 \
            -t my_publishing:${{ github.sha }} .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: my_publishing:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: success()
        with:
          sarif_file: trivy-results.sarif
