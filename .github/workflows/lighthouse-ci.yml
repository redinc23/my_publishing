name: Lighthouse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Canonical origin per ADR-001 (ACCEPTED Option B — Vercel). Interim www until apex DNS cutover.
env:
  TARGET_URL: https://www.mangu-publishers.com

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Run Lighthouse CI
        # || true keeps this non-blocking so performance regressions are visible
        # as warnings rather than hard failures; promote to a gate once budgets are tuned
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun --collect.url=${{ env.TARGET_URL }} || true
