name: Bug to Issue (continuous failures)

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: bug-to-issue-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  create_or_update_issue:
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'

      # State is operational data, not source code. Cache snapshots remove the
      # previous workflow's direct-push loop on main.
      - name: Restore bug-to-issue state
        uses: actions/cache/restore@v4
        with:
          path: .github/bug-to-issue-state.json
          key: bug-to-issue-state-${{ github.run_id }}
          restore-keys: |
            bug-to-issue-state-

      - name: Install deps
        run: npm i --no-save @actions/core@1.11.1 @actions/github@6.0.0

      - name: Run bug-to-issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_HTML_URL: ${{ github.event.workflow_run.html_url }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          THRESHOLD_FAILS: '3'
          CLOSE_AFTER_SUCCESSES: '2'
        run: node .github/scripts/bug-to-issue.js

      - name: Save bug-to-issue state
        uses: actions/cache/save@v4
        with:
          path: .github/bug-to-issue-state.json
          key: bug-to-issue-state-${{ github.run_id }}
