name: Agent Tasks (evidence)

on:
  pull_request:
  workflow_dispatch:

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: List agent tasks
        run: npx tsx tools/agent-tasks.ts list

      # Example: run format task in dry-run mode for evidence.
      # Switch to non-dry-run if you want CI to enforce formatting.
      - name: Dry-run format task
        run: npx tsx tools/agent-tasks.ts run quickstart:format --dry-run

      # Example: show a specific task
      - name: Show CI validation task
        run: npx tsx tools/agent-tasks.ts show ci:lint-test
