name: Auto-Merge PRs

on:
  pull_request:
    types: [opened, synchronize, labeled, reopened]
  check_suite:
    types: [completed]

permissions:
  pull-requests: write
  contents: write
  checks: read
  issues: write

concurrency:
  group: auto-merge
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Auto-merge human-labeled PRs
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const requiredChecks = ['test', 'format'];

            const { data: prs } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              base: 'main',
              per_page: 100
            });

            for (const pr of prs) {
              const labels = pr.labels.map((label) => label.name);
              if (!labels.includes('auto-merge')) {
                core.info(`Skipping PR #${pr.number} — no human-applied auto-merge label`);
                continue;
              }

              const { data: checks } = await github.rest.checks.listForRef({
                owner, repo,
                ref: pr.head.sha,
                per_page: 100
              });

              const runs = checks.check_runs.filter((run) => run.name !== 'auto-merge');
              const required = requiredChecks.map((name) => runs.find((run) => run.name === name));
              const missing = requiredChecks.filter((_, index) => !required[index]);
              if (missing.length > 0) {
                core.info(`PR #${pr.number}: waiting for required checks: ${missing.join(', ')}`);
                continue;
              }

              const incomplete = required.filter((run) => run.status !== 'completed');
              if (incomplete.length > 0) {
                core.info(`PR #${pr.number}: required checks are still running`);
                continue;
              }

              const failed = required.filter((run) => run.conclusion !== 'success');
              if (failed.length > 0) {
                core.warning(`PR #${pr.number}: required checks failed — not merging`);
                // Hint once per failing head SHA when the closed-loop dispatcher is armed.
                const marker = `<!-- auto-merge-ci-fail:${pr.head.sha} -->`;
                const { data: comments } = await github.rest.issues.listComments({
                  owner, repo,
                  issue_number: pr.number,
                  per_page: 100
                });
                const alreadyHinted = comments.some((c) => (c.body || '').includes(marker));
                if (!alreadyHinted) {
                  await github.rest.issues.createComment({
                    owner, repo,
                    issue_number: pr.number,
                    body: [
                      marker,
                      '❌ **Auto-merge skipped** — required CI checks failed.',
                      'If `CURSOR_API_KEY` is configured, **ci-fix-loop.yml** can dispatch a Cursor agent to fix and push; auto-merge retries when CI goes green.',
                      'Pause dispatches with the `ci-fix-loop-paused` label.'
                    ].join(' ')
                  });
                }
                continue;
              }

              core.info(`Merging PR #${pr.number}: ${pr.title}`);
              try {
                const result = await github.rest.pulls.merge({
                  owner, repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: `${pr.title} (#${pr.number})`,
                  commit_message: pr.body || ''
                });
                if (!result.data.merged) {
                  core.warning(`PR #${pr.number} was not merged: ${result.data.message}`);
                }
              } catch (error) {
                core.warning(`Could not merge PR #${pr.number}: ${error.message}`);
              }
            }
