version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Development mode with hot-reload
  # Uncomment to use for development instead of production build
  # app-dev:
  #   image: node:18-alpine
  #   working_dir: /app
  #   volumes:
  #     - .:/app
  #     - /app/node_modules
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - .env.local
  #   environment:
  #     - NODE_ENV=development
  #   command: sh -c "npm install && npm run dev"
  #   restart: unless-stopped
